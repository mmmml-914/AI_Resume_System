name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check core imports
        run: |
          python -c "from modules.coordinator import AgentCoordinator; print('coordinator OK')"
          python -c "from modules.resume_evaluator import ResumeEvaluator; print('resume_evaluator OK')"
          python -c "from modules.analysis_agent import AnalysisAgent; print('analysis_agent OK')"
          python -c "from modules.evaluation_agent import EvaluationAgent; print('evaluation_agent OK')"
          python -c "from modules.interview_agent import InterviewAgent; print('interview_agent OK')"
          python -c "from modules.rag_knowledge import get_chroma_collection; print('rag_knowledge OK')"

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --timeout=120
