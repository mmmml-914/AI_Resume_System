<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Resume System</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif}
html,body{background:#F5F5F5;color:#1A1A1A;overflow:hidden;height:100%}
.layout{display:flex;height:100%}
.sidebar{width:210px;height:100%;background:rgba(255,255,255,0.82);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-right:1px solid rgba(0,0,0,0.05);display:flex;flex-direction:column;flex-shrink:0;padding-top:40px}
.sidebar .logo{padding:14px 16px;border-bottom:1px solid #F0F0F0;display:flex;align-items:center;gap:10px;margin-bottom:16px}
.sidebar .logo .badge{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#FF6900,#FF8C42);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px}
.sidebar .logo .title{font-size:13px;font-weight:700;color:#1A1A1A}
.sidebar .logo .ver{font-size:10px;color:#B0B0B0}
.nav{padding:6px 8px;flex:1;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:12px;font-size:13px;cursor:pointer;user-select:none;transition:all .2s ease;margin-bottom:2px;color:#666}
.nav-item:hover{background:#FFF0E5;color:#FF6900}
.nav-item.active{background:#FFF0E5;color:#FF6900;font-weight:600}
.nav-item .ico{font-size:15px;width:20px;text-align:center}
.sidebar .footer{padding:10px 16px;border-top:1px solid #F0F0F0;font-size:10px;color:#B0B0B0}
.sidebar .footer a{color:#B0B0B0;text-decoration:none}
.sidebar .footer a:hover{color:#FF6900}
.content{flex:1;overflow:hidden;padding:20px 24px;display:flex;flex-direction:column}
#pg{flex:1;overflow-y:auto;min-height:0}
#pg.fade-in{animation:fadeIn .25s ease}
.card{background:#fff;border-radius:18px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.card-title{font-size:11px;color:#B0B0B0;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.btn{background:linear-gradient(135deg,#FF6900,#FF8C42);color:#fff;border:none;border-radius:12px;padding:8px 20px;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s ease;display:inline-flex;align-items:center;gap:6px;box-shadow:0 2px 8px rgba(255,105,0,0.25)}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(255,105,0,0.35)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.5;cursor:default;transform:none;box-shadow:none}
.btn2{background:#F5F5F5;color:#333;border:1px solid #E8E8E8;border-radius:12px;padding:8px 18px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .2s ease}
.btn2:hover{background:#EBEBEB;border-color:#D0D0D0}
input,textarea,select{background:#F9F9F9;border:1px solid #E8E8E8;border-radius:10px;color:#1A1A1A;padding:8px 12px;outline:none;width:100%;font-size:13px;transition:border-color .2s}
input:focus,textarea:focus,select:focus{border-color:#FF6900;box-shadow:0 0 0 3px rgba(255,105,0,0.1)}
table.data{width:100%;border-collapse:collapse;font-size:13px}
table.data th{text-align:left;padding:8px 10px;font-size:11px;font-weight:600;text-transform:uppercase;color:#B0B0B0;border-bottom:1px solid #F0F0F0}
table.data td{padding:8px 10px;border-bottom:1px solid #F0F0F0}
table.data tbody tr:hover{background:#FFFBF7}
.upload-btn{display:inline-flex;align-items:center;gap:4px;border:1px dashed #D0D0D0;border-radius:8px;padding:5px 14px;cursor:pointer;font-size:12px;color:#999;transition:all .2s ease}
.upload-btn:hover{border-color:#FF6900;color:#FF6900;background:#FFFBF7}
.page-title{font-size:22px;font-weight:700;margin-bottom:2px;color:#1A1A1A}
.page-sub{font-size:12px;color:#B0B0B0;margin-bottom:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.kpi{background:#fff;border-radius:18px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.kpi label{font-size:10px;color:#B0B0B0;display:block;margin-bottom:4px;text-transform:uppercase;font-weight:600;letter-spacing:.3px}
.kpi .val{font-size:22px;font-weight:700;font-family:'SF Mono','Courier New',monospace}
.kpi .sub{font-size:10px;color:#B0B0B0;margin-top:4px}
.mono{font-family:'SF Mono','Courier New',monospace}
.flex{display:flex}
.flex-1{flex:1}
.items-center{align-items:center}
.justify-between{justify-content:space-between}
.gap-2{gap:8px}
.gap-3{gap:12px}
.mb-2{margin-bottom:8px}
.mb-3{margin-bottom:12px}
.mb-4{margin-bottom:16px}
.mt-2{margin-top:8px}
.text-center{text-align:center}
.text-xs{font-size:12px;color:#999}
.text-sm{font-size:13px}
.hidden{display:none}
.progress{width:100%;background:#F0F0F0;border-radius:999px;height:6px;overflow:hidden}
.progress-bar{height:6px;border-radius:999px;background:linear-gradient(90deg,#FF6900,#FF8C42);transition:width .3s}
.msg{margin-bottom:8px;display:flex;gap:8px;align-items:flex-start}
.msg .av{width:28px;height:28px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.msg .bubble{padding:8px 14px;border-radius:10px;max-width:75%;font-size:13px;line-height:1.5}
.msg.user{flex-direction:row-reverse}
.msg.user .bubble{background:#FFF0E5;color:#1A1A1A}
.msg.ai .av{background:linear-gradient(135deg,#FF6900,#FF8C42);color:#fff}
.msg.user .av{background:#E8E8E8;color:#666}
.msg.ai .bubble{background:#fff;color:#1A1A1A;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.chat-area{display:flex;flex-direction:column;height:calc(100vh - 130px)}
.chat-msgs{flex:1;overflow-y:auto;margin-bottom:12px;padding:4px}
.chat-input{display:flex;gap:8px}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(20px)}}

.spinner{width:16px;height:16px;border:2px solid #E8E8E8;border-top-color:#FF6900;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle}

.toast-ctr{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:10px 16px;border-radius:12px;font-size:13px;font-weight:500;max-width:360px;pointer-events:auto;animation:toastIn .25s ease;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,0.1)}
.toast.info{background:#fff;border:1px solid #E8E8E8;color:#333}
.toast.error{background:#FFF5F5;border:1px solid #FFCCCC;color:#CC3333}
.toast.success{background:#F0FFF4;border:1px solid #B7EBC8;color:#1A7A3A}
.toast.removing{animation:toastOut .2s ease forwards}

.empty-state{padding:40px 0;text-align:center;color:#B0B0B0}
.empty-state .icon{font-size:32px;margin-bottom:8px}
.empty-state .title{font-size:14px;font-weight:600;color:#999;margin-bottom:4px}
.empty-state .desc{font-size:12px;color:#B0B0B0}

.skeleton{background:linear-gradient(90deg,#F0F0F0 25%,#E8E8E8 50%,#F0F0F0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>

<div class="toast-ctr" id="toastCtr"></div>

<div class="layout">
  <div class="sidebar">
    <div class="logo">
      <div class="badge">AI</div>
      <div><div class="title">Resume System</div><div class="ver">v2.0</div></div>
    </div>
    <div class="nav" id="snav">
      <div class="nav-item active" onclick="pg('overview')"><span class="ico">📊</span>总览</div>
      <div class="nav-item" onclick="pg('batch')"><span class="ico">🔬</span>批量测试</div>
      <div class="nav-item" onclick="pg('experiment')"><span class="ico">🧪</span>双盲实验</div>
      <div class="nav-item" onclick="pg('analysis')"><span class="ico">📈</span>数据看板</div>
      <div class="nav-item" onclick="pg('polish')"><span class="ico">✨</span>简历润色</div>
      <div class="nav-item" onclick="pg('chat')"><span class="ico">🤖</span>AI 助手</div>
      <div class="nav-item" onclick="pg('interview')"><span class="ico">🎤</span>模拟面试</div>
    </div>
    <div class="footer"><a href="http://localhost:8501" target="_blank">&#8599; Streamlit 原版</a></div>
  </div>
  <div class="content" id="main"><div id="pg"></div></div>
</div>

<script>
const API = '/api';
let _charts = {};
let _iv = {phase:'input',sid:null,eval:null,msgs:[],report:null};
const pages = ['overview','batch','experiment','analysis','polish','chat','interview'];

// === TOAST ===
function toast(msg, type) {
  type = type || 'info';
  var ctr = document.getElementById('toastCtr');
  var el = document.createElement('div');
  el.className = 'toast ' + type;
  var icons = {info:'ℹ️', error:'⚠️', success:'✅'};
  el.innerHTML = '<span>'+(icons[type]||'')+'</span><span>'+msg+'</span>';
  ctr.appendChild(el);
  setTimeout(function(){ el.classList.add('removing'); setTimeout(function(){ el.remove(); }, 200); }, 3500);
}

// === SPINNER ===
function spin() { return '<span class="spinner"></span>'; }

function btnLoad(btn, loading) {
  btn.disabled = loading;
  if (loading) {
    btn._prev = btn.innerHTML;
    btn.innerHTML = '<span class="spinner"></span> ' + (btn.getAttribute('data-loading') || '处理中');
  } else {
    btn.innerHTML = btn._prev || btn.innerHTML;
  }
}

// === PAGE NAVIGATION ===
function pg(name) {
  document.querySelectorAll('.nav-item').forEach(function(el){ el.classList.remove('active'); });
  var items = document.querySelectorAll('.nav-item');
  var idx = pages.indexOf(name);
  if (idx >= 0 && items[idx]) items[idx].classList.add('active');
  Object.values(_charts).forEach(function(c){ try { c.destroy(); } catch(e) {} });
  _charts = {};
  var pgEl = document.getElementById('pg');
  pgEl.classList.remove('fade-in');
  void pgEl.offsetWidth;
  pgEl.classList.add('fade-in');
  var fns = {overview:ov,batch:ba,experiment:ex,analysis:an,polish:pl,chat:ch,interview:iv};
  (fns[name] || ov)();
}

function chart(id, cfg) {
  var el = document.getElementById(id);
  if (!el) return null;
  try {
    var c = new Chart(el, cfg);
    _charts[id] = c;
    return c;
  } catch(e) { return null; }
}

// === OVERVIEW ===
async function ov() {
  var pgEl = document.getElementById('pg');
  pgEl.innerHTML = '<h1 class="page-title">📊 总览</h1><p class="page-sub">AI 简历评估系统</p>' +
    '<div class="grid-4" id="kp">' +
      '<div class="kpi"><label>总评估</label><div class="val" style="color:#8C8C8C"><span class="spinner"></span></div></div>' +
      '<div class="kpi"><label>人工均分</label><div class="val" style="color:#8C8C8C"><span class="spinner"></span></div></div>' +
      '<div class="kpi"><label>AI 均分</label><div class="val" style="color:#8C8C8C"><span class="spinner"></span></div></div>' +
      '<div class="kpi"><label>岗位类别</label><div class="val" style="color:#8C8C8C"><span class="spinner"></span></div></div>' +
    '</div>' +
    '<div class="grid-2" style="margin-top:16px">' +
      '<div class="card"><div class="card-title">AI 维度平均分</div><div style="height:220px"><canvas id="ovRadar"></canvas></div></div>' +
      '<div class="card"><div class="card-title">人机评分对比</div><div style="height:220px"><canvas id="ovScat"></canvas></div></div>' +
    '</div>' +
    '<div class="card" style="margin-top:16px"><div class="card-title">类别分布 Top 10</div><div style="height:100px"><canvas id="ovBar"></canvas></div></div>' +
    '<div class="card" style="margin-top:16px"><div class="card-title">最近评估</div><table class="data"><thead><tr><th>类别</th><th style="text-align:center">人工</th><th style="text-align:center">AI</th><th style="text-align:center">差值</th></tr></thead><tbody id="ovTbl"><tr><td colspan="4" style="text-align:center;color:#8C8C8C">'+spin()+' 加载中...</td></tr></tbody></table></div>';
  try {
    var results = await Promise.all([
      fetch(API+'/experiments').then(function(r){return r.json();}),
      fetch(API+'/config/dimensions').then(function(r){return r.json();}),
      fetch(API+'/kaggle/stats').then(function(r){return r.json();})
    ]);
    var ed = results[0], d = results[1], ks = results[2];
    var exps = ed.experiments || [], dims = Object.values(d.dimensions || {}), kag = ks;
    var hu = exps.filter(function(x){return x.human != null;}).map(function(x){return x.human;});
    var ai = exps.filter(function(x){return x.ai_blind != null;}).map(function(x){return x.ai_blind;});
    document.getElementById('kp').innerHTML =
      '<div class="kpi"><label>总评估</label><div class="val">'+exps.length+'</div><div class="sub">Kaggle '+(kag.total||'?')+'</div></div>' +
      '<div class="kpi"><label>人工均分</label><div class="val" style="color:#FF8C42">'+(hu.length?(hu.reduce(function(a,b){return a+b;},0)/hu.length).toFixed(1):'-')+'</div><div class="sub">'+hu.length+' 份</div></div>' +
      '<div class="kpi"><label>AI 均分</label><div class="val" style="color:#FFB366">'+(ai.length?(ai.reduce(function(a,b){return a+b;},0)/ai.length).toFixed(1):'-')+'</div><div class="sub">'+ai.length+' 份</div></div>' +
      '<div class="kpi"><label>岗位类别</label><div class="val" style="color:#FFB366">'+(Object.keys(kag.cat_distribution||{}).length)+'</div><div class="sub">'+(kag.categories||0)+' 类</div></div>';
    var da = {};
    exps.forEach(function(x){(x.dimensions||[]).forEach(function(d){da[d.label]=da[d.label]||[];da[d.label].push(d.score);});});
    Object.keys(da).forEach(function(k){da[k]=Math.round(da[k].reduce(function(a,b){return a+b;},0)/da[k].length);});
    var dl = dims.map(function(d){return d.label;}), dc = dims.map(function(d){return d.color;});
    chart('ovRadar', {type:'radar', data:{labels:dl, datasets:[{data:dl.map(function(l){return da[l]||0;}), backgroundColor:'#FFF0E5', borderColor:'#FF8C42', borderWidth:2, pointBackgroundColor:dc, pointBorderColor:'#FFFFFF', pointRadius:4}]}, options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{r:{min:0,max:100, grid:{color:'#E8E8E8'}, angleLines:{color:'#E8E8E8'}, ticks:{display:false}, pointLabels:{color:'#B0B0B0', font:{size:10}}}}}});
    var sc = exps.filter(function(x){return x.human!=null && x.ai_blind!=null;});
    chart('ovScat', {type:'scatter', data:{datasets:[{data:sc.map(function(e){return {x:e.human, y:e.ai_blind};}), backgroundColor:'#FFD4B3', borderColor:'#FF6900', pointRadius:4}]}, options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}, tooltip:{callbacks:{label:function(ctx){return 'H:'+ctx.raw.x+' AI:'+ctx.raw.y;}}}}, scales:{x:{min:0,max:100, grid:{color:'#E8E8E8'}, ticks:{color:'#8C8C8C', font:{size:9}}}, y:{min:0,max:100, grid:{color:'#E8E8E8'}, ticks:{color:'#8C8C8C', font:{size:9}}}}}});
    var cts = kag.cat_distribution||{};
    chart('ovBar', {type:'bar', data:{labels:Object.keys(cts).slice(0,10), datasets:[{data:Object.values(cts).slice(0,10), backgroundColor:'#FFE0CC', borderColor:'#FF6900', borderWidth:2, borderRadius:4}]}, options:{indexAxis:'y', responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{grid:{color:'#E8E8E8'}, ticks:{color:'#8C8C8C', font:{size:9}}}, y:{grid:{display:false}, ticks:{color:'#B0B0B0', font:{size:9}}}}}});
    var tb = document.getElementById('ovTbl');
    tb.innerHTML = '';
    sc.slice(0,10).forEach(function(e){
      var diff = e.human - e.ai_blind;
      tb.innerHTML += '<tr><td style="font-weight:500">'+e.category+'</td><td style="text-align:center;font-weight:600" class="mono">'+e.human+'</td><td style="text-align:center" class="mono">'+e.ai_blind+'</td><td style="text-align:center" class="mono" style="color:'+(Math.abs(diff)<5?'#8C8C8C':diff>0?'#FF8C42':'#FFB366')+'">'+(diff>0?'+'+diff:diff)+'</td></tr>';
    });
  } catch(e) {
    toast('总览数据加载失败: '+e.message, 'error');
    pgEl.innerHTML = '<div class="empty-state" style="padding:60px 0"><div class="icon">⚠️</div><div class="title">API 服务器未连接</div><div class="desc">请运行 python frontend/api_server.py</div></div>';
  }
}

// === BATCH ===
async function ba() {
  var pgEl = document.getElementById('pg');
  pgEl.innerHTML = '<h1 class="page-title">🔬 批量测试</h1><p class="page-sub">多份简历批量 AI 评分</p>' +
    '<div class="grid-3" style="margin-bottom:16px">' +
      '<div class="card"><div class="card-title">岗位</div><select id="bCat" style="font-size:12px"></select></div>' +
      '<div class="card"><div class="card-title">数量</div><div class="flex items-center gap-2"><input type="range" id="bN" min="3" max="15" value="10" style="padding:0;height:18px;flex:1"><span id="bNl" class="mono" style="font-size:16px;font-weight:700;color:#FF6900">10</span></div></div>' +
      '<div class="card" style="display:flex;flex-direction:column;justify-content:flex-end"><button class="btn" onclick="bRun()" id="bBtn">▶ 开始</button></div>' +
    '</div>' +
    '<div id="bPr" class="hidden" style="margin-bottom:12px"><div class="card"><div class="flex items-center gap-2 mb-2"><span id="bSt" style="font-size:13px">运行中...</span></div><div class="progress"><div class="progress-bar" id="bBar" style="width:0%"></div></div></div></div>' +
    '<div id="bRs" class="hidden">' +
      '<div class="card" style="margin-bottom:12px"><div class="card-title">评分结果</div><table class="data"><thead><tr><th>岗位</th><th style="text-align:center">综合</th><th style="text-align:center">技能</th><th style="text-align:center">项目</th><th style="text-align:center">格式</th><th style="text-align:center">教育</th><th style="text-align:center">表达</th></tr></thead><tbody id="bTbl"></tbody></table></div>' +
      '<div class="card" style="margin-bottom:12px"><div class="card-title">综合评分对比</div><div style="height:120px"><canvas id="bCht"></canvas></div></div>' +
      '<div class="grid-4" id="bSts"></div>' +
    '</div>';
  try {
    var r = await fetch(API+'/kaggle/stats').then(function(r){return r.json();});
    var cts = Object.keys(r.cat_distribution||{});
    document.getElementById('bCat').innerHTML = '<option value="全部">全部类别</option>' + cts.map(function(c){return '<option>'+c+'</option>';}).join('');
    document.getElementById('bN').addEventListener('input', function(){ document.getElementById('bNl').textContent = this.value; });
  } catch(e) {
    toast('加载岗位列表失败', 'error');
  }
}
async function bRun() {
  var cat = document.getElementById('bCat').value, n = parseInt(document.getElementById('bN').value);
  var btn = document.getElementById('bBtn'), pr = document.getElementById('bPr'), rs = document.getElementById('bRs'), bar = document.getElementById('bBar'), st = document.getElementById('bSt');
  btnLoad(btn, true);
  pr.classList.remove('hidden'); rs.classList.add('hidden'); bar.style.width = '0%';
  var t0 = Date.now();
  var tmr = setInterval(function(){ bar.style.width = Math.min(90, Math.round((Date.now()-t0)/1000/n*10))+'%'; }, 500);
  st.innerHTML = spin()+' 评估 0/'+n+'...';
  try {
    var r = await fetch(API+'/batch', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({category:cat, count:n})}).then(function(r){return r.json();});
    clearInterval(tmr); bar.style.width = '100%';
    st.innerHTML = '✅ '+(r.total||0)+' 份'+(r.errors ? ', '+r.errors+' 失败' : '');
    if (r.results && r.results.length) { bShow(r.results); rs.classList.remove('hidden'); }
    toast('批量评估完成: '+r.total+' 份', 'success');
  } catch(e) {
    clearInterval(tmr);
    st.innerHTML = '❌ '+e.message;
    toast('批量评估失败: '+e.message, 'error');
  }
  btnLoad(btn, false);
}
function bShow(r) {

  if (!confirm('结束面试并生成报告？')) return;
  var btn = document.getElementById('ivEndBtn');
  btnLoad(btn, true);
  try {
    var r = await fetch(API+'/interview/end', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({session_id:_iv.sid})}).then(function(r){return r.json();});
    if (r.error) { toast(r.error, 'error'); btnLoad(btn, false); return; }
    _iv.report = r; _iv.phase = 'report';
    toast('面试报告已生成', 'success');
    ivR();
  } catch(e) { toast('生成报告失败: '+e.message, 'error'); btnLoad(btn, false); }
}
function ivR() {
  var r = _iv.report||{}, ev = _iv.eval||{}, pgEl = document.getElementById('pg');
  if (r.error) { pgEl.innerHTML = '<div class="empty-state" style="padding:60px 0"><div class="icon">⚠️</div><div class="title">'+r.error+'</div></div>'; return; }
  var dims = r.dimensions||{}, dk = ['technical_accuracy','communication','problem_solving','domain_knowledge'];
  var dl = {'technical_accuracy':'技术准确性','communication':'沟通表达','problem_solving':'问题解决能力','domain_knowledge':'领域知识'};
  pgEl.innerHTML = '<div class="flex justify-between items-center" style="margin-bottom:16px"><div><h1 class="page-title" style="margin-bottom:0">📋 面试报告</h1></div><button class="btn2" onclick="ivRs()">🔄 重来</button></div>' +
    '<div class="grid-4" style="margin-bottom:16px">' +
      '<div class="kpi"><label>综合评分</label><div class="val" style="color:#FF6900">'+(r.overall||0)+'</div></div>' +
      '<div class="kpi"><label>面试题数</label><div class="val">'+((r.stats||{}).total_questions||0)+'</div></div>' +
      '<div class="kpi"><label>简历评分</label><div class="val" style="color:#FF8C42">'+(ev.overall||0)+'</div></div>' +
      '<div class="kpi"><label>对话轮次</label><div class="val">'+((r.stats||{}).conversation_length||0)+'</div></div>' +
    '</div>' +
    '<div class="grid-2" style="margin-bottom:16px">' +
      '<div class="card"><div class="card-title">维度评分</div><div id="ivDims"></div></div>' +
      '<div class="card"><div class="card-title">简历 vs 面试</div><div style="height:180px"><canvas id="ivRd"></canvas></div></div>' +
    '</div>' +
    '<div class="grid-2" style="margin-bottom:16px">' +
      '<div class="card"><div class="card-title">💪 优势</div><div id="ivStr"></div></div>' +
      '<div class="card"><div class="card-title">📈 待提升</div><div id="ivWeak"></div></div>' +
    '</div>' +
    '<div class="card" style="margin-bottom:16px"><div class="card-title">💡 建议</div><div id="ivSug"></div></div>' +
    (r.evaluation_gaps ? '<div class="card" style="margin-bottom:16px"><div class="card-title">差异分析</div><p style="font-size:13px;color:#B0B0B0">'+r.evaluation_gaps+'</p></div>' : '') +
    '<div class="text-center" style="margin-top:8px"><button class="btn" onclick="ivRs()">🔄 重新面试</button></div>';

  var dimHtml = '';
  for (var i = 0; i < dk.length; i++) {
    var k = dk[i], d = dims[k];
    if (!d) continue;
    var s = d.score||0, cl = s>=70?'#FF6900':s>=50?'#FFB366':'#FF4444';
    dimHtml += '<div style="margin-bottom:10px"><div class="flex justify-between" style="font-size:12px;margin-bottom:2px"><span>'+(dl[k]||k)+'</span><span class="mono" style="font-weight:700;color:'+cl+'">'+s+'</span></div><div class="progress"><div class="progress-bar" style="width:'+s+'%;background:'+cl+'"></div></div><div style="font-size:11px;color:#8C8C8C;margin-top:2px">'+(d.comment||'')+'</div></div>';
  }
  document.getElementById('ivDims').innerHTML = dimHtml || '<div style="font-size:12px;color:#8C8C8C">暂无数据</div>';

  var lm = {'technical_accuracy':'技能匹配度','communication':'内容表达','problem_solving':'项目经验质量','domain_knowledge':'领域知识'};
  var ed = {};
  (ev.dimensions||[]).forEach(function(d){ed[d.key]=d.score;});
  var rl=[],es=[],isv=[];
  for (var i = 0; i < dk.length; i++) {
    var k = dk[i], v = dims[k];
    if (v && v.score != null) { rl.push(lm[k]||k); es.push(ed[k]||0); isv.push(v.score); }
  }
  if (rl.length) {
    chart('ivRd', {type:'radar', data:{labels:rl, datasets:[{label:'简历', data:es, backgroundColor:'#FFF0E5', borderColor:'#FF8C42', borderWidth:2, pointRadius:3},{label:'面试', data:isv, backgroundColor:'#FFF0E5', borderColor:'#FF6900', borderWidth:2, pointRadius:3}]}, options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{labels:{color:'#B0B0B0', font:{size:10}}}}, scales:{r:{min:0,max:100, grid:{color:'#E8E8E8'}, angleLines:{color:'#E8E8E8'}, ticks:{display:false}, pointLabels:{color:'#B0B0B0', font:{size:9}}}}}});
  }

  document.getElementById('ivStr').innerHTML = (r.strengths||[]).length ? r.strengths.map(function(s){return '<div style="font-size:13px;margin-bottom:4px">• '+s+'</div>';}).join('') : '<div class="empty-state"><div class="icon">💪</div><div class="title">暂无数据</div></div>';
  document.getElementById('ivWeak').innerHTML = (r.weaknesses||[]).length ? r.weaknesses.map(function(w){return '<div style="font-size:13px;margin-bottom:4px">• '+w+'</div>';}).join('') : '<div class="empty-state"><div class="icon">📈</div><div class="title">暂无数据</div></div>';
  document.getElementById('ivSug').innerHTML = (r.suggestions||[]).length ? r.suggestions.map(function(s,i){return '<div style="font-size:13px;margin-bottom:4px">'+(i+1)+'. '+s+'</div>';}).join('') : '<div class="empty-state"><div class="icon">💡</div><div class="title">暂无数据</div></div>';
}
function ivRs() { _iv = {phase:'input',sid:null,eval:null,msgs:[],report:null}; iv(); }

// === START ===
ov();
</script>
